<!doctype html>
<html itemtype="https://schema.org/VideoGame" lang="en">
  <head>
    <meta charset="utf-8" />

    <title>The Daily Facet</title>
    <script>
      // ?d=YYYY-MM-DD carries a specific date through to the app's ?daily param - only ever set when
      // someone re-shares an EARLIER Daily Facet (see HandleShareDailyResult in the facets repo). No value
      // means today, the common case, unchanged from before.
      var d = new URLSearchParams(location.search).get("d");
      var origin = location.hostname.endsWith(".local") ? "https://facets.bigtentgames.local/" : "https://facets.bigtentgames.com/";
      location.replace(origin + (d ? "?daily=" + encodeURIComponent(d) : "?daily"));
    </script>
    <noscript><meta http-equiv="refresh" content="0; URL=https://facets.bigtentgames.com/?daily" /></noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="rgb(0, 9, 15)" />

    <meta name="keywords" content="The Daily Facet, free online game, brain teaser, casual game, puzzle game, word game, word association, puzzle, social game" />
    <meta name="description" content="The Daily Facet: a new word association puzzle every day." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:title" content="The Daily Facet" />
    <meta property="og:site_name" content="daily-facets.com/open" />
    <meta property="og:author" content="Wil Voss" />
    <meta property="og:description" content="A new word association puzzle every day." />

    <meta property="og:url" content="https://daily-facets.com/" />
    <meta property="og:image" content="https://daily-facets.com/images/facets_og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

</html>
