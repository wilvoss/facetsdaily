<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- No title/description/favicon/OG here on purpose: this root only bounces to the game, and a bare,
         metadata-free page gives link-preview crawlers (iMessage, Slack, etc.) nothing to build a card
         from - so brag texts show no preview bubble. The rich, previewable copy lives in /open. -->
    <script>
      // ?d=YYYY-MM-DD carries a specific date through to the app's ?daily param - only ever set when
      // someone re-shares an EARLIER daily (see HandleShareDailyResult in the facets repo). No value
      // means today, the common case, unchanged from before.
      var d = new URLSearchParams(location.search).get("d");
      var origin = location.hostname.endsWith(".local") ? "https://facets.bigtentgames.local/" : "https://facets.bigtentgames.com/";
      location.replace(origin + (d ? "?daily=" + encodeURIComponent(d) : "?daily"));
    </script>
    <noscript><meta http-equiv="refresh" content="0; URL=https://facets.bigtentgames.com/?daily" /></noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  </head>

  <body></body>
</html>
